<!DOCTYPE html>

<head><style>/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body {
    background-color: white;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    color: #202124;
}

/* Google Logo */
img {
    margin-top: 50px;
    border-radius: 12px;
    transition: transform 0.3s;
}

img:hover {
    transform: scale(1.05);
}

/* Header */
header {
    font-size: 30px;
    font-weight: bold;
    color: #4285F4;
    margin: 20px 0;
}

/* Navigation */

    display: inline-block;
    margin: 10px;
}

div a {
    text-decoration: none;
    color: #1a73e8;
    font-size: 18px;
    padding: 8px 15px;
    border-radius: 20px;
    transition: 0.3s;
}

div a:hover {
    background-color: #e8f0fe;
    color: #174ea6;
}

/* Main */
main {
    margin-top: 40px;
    font-size: 22px;
    color: #5f6368;
}

/* Footer */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #f2f2f2;
    padding: 15px;
    border-top: 1px solid #dadce0;
    color: #5f6368;
}</style>
